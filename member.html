<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">सदस्य प्रोफाइल | संघीय संसद सम्पर्क निर्देशिका</title>
<meta name="description" content="संसद सदस्यको पूर्ण सम्पर्क प्रोफाइल — फोन, इमेल, जिल्ला र राजनीतिक दल।">
<meta name="theme-color" content="#0B1A2E">
<link rel="icon" href="assets/images/emblem.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<a class="skip-link" href="#main">मुख्य सामग्रीमा जानुहोस्</a>
<header class="site-header" id="siteHeader"></header>

<main id="main">
  <div class="profile-hero">
    <a class="back-link" href="directory.html">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      निर्देशिकामा फर्कनुहोस्
    </a>
    <div id="profileMount">
      <div class="loading-state"><div class="spinner"></div>प्रोफाइल लोड हुँदैछ…</div>
    </div>
  </div>
</main>

<footer class="site-footer" id="siteFooter"></footer>

<script src="assets/js/app.js"></script>
<script>
APP.renderHeader("directory.html");
APP.renderFooter();

(async function () {
  const mount = document.getElementById("profileMount");
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    mount.innerHTML = `<div class="panel"><p>कुनै सदस्य ID दिइएको छैन। कृपया निर्देशिकाबाट कुनै सदस्य छान्नुहोस्।</p></div>`;
    return;
  }

  let data;
  try {
    data = await APP.loadJSON("members.json");
  } catch (e) {
    mount.innerHTML = `<div class="panel"><p>डाटा लोड गर्न असफल भयो।</p></div>`;
    return;
  }

  const m = data.members.find(x => x.id === id);
  if (!m) {
    mount.innerHTML = `<div class="panel"><p>सदस्य फेला परेन। यो ID अवस्थित छैन: <strong>${APP.escapeHtml(id)}</strong></p></div>`;
    return;
  }

  document.title = `${m.name_ne} | संघीय संसद सम्पर्क निर्देशिका`;
  document.getElementById("pageTitle").textContent = document.title;

  const color = APP.partyColorVar(m.party_code);
  const initial = (m.name_ne || "?").replace(/^मा\.\s*/, "").replace(/^डा\.\s*/, "").trim().charAt(0);
  const avatarInner = m.photo
    ? `<img src="${m.photo}" alt="" onerror="this.parentElement.innerHTML='${initial}'">`
    : initial;
  const phone = m.phones && m.phones[0];
  const email = m.emails && m.emails[0];

  mount.innerHTML = `
    <div class="profile-card" style="--party-color:${color}">
      <div class="profile-top">
        <div class="profile-avatar">${avatarInner}</div>
        <div>
          ${m.role ? `<span class="role-pill">${APP.escapeHtml(m.role)}</span>` : ""}
          <h1 class="profile-name">${APP.escapeHtml(m.name_ne)}<span class="en">${APP.escapeHtml(m.name_en || "")}</span></h1>
          <span class="profile-party">${APP.escapeHtml(m.party_ne || "—")}</span>
        </div>
      </div>

      <div class="profile-details">
        <div class="detail-item">
          <div class="k">सदन</div>
          <div class="v">${m.house === "HoR" ? "प्रतिनिधि सभा" : "राष्ट्रिय सभा"}</div>
        </div>
        <div class="detail-item">
          <div class="k">जिल्ला / प्रदेश</div>
          <div class="v">${APP.escapeHtml(m.district || "उल्लेख नभएको")}</div>
        </div>
        <div class="detail-item">
          <div class="k">फोन नम्बर</div>
          <div class="v">${phone ? `<a href="tel:+977${phone}">${phone}</a>` : "उपलब्ध छैन"}</div>
        </div>
        <div class="detail-item">
          <div class="k">इमेल</div>
          <div class="v">${email ? `<a href="mailto:${email}">${email}</a>` : "उपलब्ध छैन"}</div>
        </div>
        <div class="detail-item">
          <div class="k">सदस्य ID</div>
          <div class="v">${m.id}</div>
        </div>
        <div class="detail-item">
          <div class="k">दल कोड</div>
          <div class="v">${m.party_code}</div>
        </div>
      </div>

      <div class="profile-actions">
        ${phone ? `<a class="btn whatsapp-btn" id="waBtn" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.001 2C6.478 2 2 6.477 2 12c0 1.83.494 3.626 1.432 5.2L2 22l4.933-1.408A9.945 9.945 0 0 0 12.001 22c5.523 0 10-4.477 10-10s-4.477-10-10-10zm0 18.2c-1.65 0-3.263-.444-4.666-1.286l-.334-.198-2.929.836.85-2.858-.217-.34A8.19 8.19 0 0 1 3.8 12c0-4.526 3.674-8.2 8.2-8.2s8.2 3.674 8.2 8.2-3.674 8.2-8.2 8.2z"/></svg>WhatsApp</a>` : ""}
        <button class="btn primary" id="vcardBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>vCard डाउनलोड</button>
        <button class="btn" id="copyBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>सम्पर्क कपी</button>
        <button class="btn" id="shareBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>साझा गर्नुहोस्</button>
        <button class="btn" id="printProfileBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>प्रिन्ट</button>
      </div>
    </div>
  `;

  if (phone) document.getElementById("waBtn").href = APP.whatsappLink(phone);
  document.getElementById("vcardBtn").addEventListener("click", () => {
    APP.downloadFile(`${(m.name_en || m.id).replace(/\s+/g, "_")}.vcf`, APP.vCard(m), "text/vcard");
  });
  document.getElementById("copyBtn").addEventListener("click", () => {
    const parts = [m.name_en || m.name_ne, phone, email].filter(Boolean);
    APP.copyText(parts.join(" · "), "सम्पर्क विवरण");
  });
  document.getElementById("shareBtn").addEventListener("click", async () => {
    const url = window.location.href;
    if (navigator.share) {
      try { await navigator.share({ title: m.name_en || m.name_ne, url }); }
      catch (e) { /* user cancelled */ }
    } else {
      APP.copyText(url, "लिङ्क");
    }
  });
  document.getElementById("printProfileBtn").addEventListener("click", () => window.print());
})();
</script>
</body>
</html>
