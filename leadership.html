<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>नेतृत्व | Leadership — संघीय संसद सम्पर्क निर्देशिका</title>
<meta name="description" content="सभामुख, उपसभामुख, राष्ट्रिय सभा अध्यक्ष, उपाध्यक्ष र प्रधानमन्त्रीको आधिकारिक सम्पर्क कार्यालय जानकारी।">
<meta name="theme-color" content="#0B1A2E">
<link rel="canonical" href="https://nepal-parliament-directory.vercel.app/leadership.html">
<link rel="icon" href="assets/images/emblem.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<a class="skip-link" href="#main">मुख्य सामग्रीमा जानुहोस्</a>
<header class="site-header" id="siteHeader"></header>

<main id="main">
  <div class="page-hero">
    <h1>नेतृत्व</h1>
    <p>संघीय संसदको नेतृत्व तहका पदाधिकारीहरूको आधिकारिक कार्यालय सम्पर्क विवरण।</p>
  </div>

  <div class="section">
    <div class="leader-grid" id="leaderGrid">
      <div class="loading-state"><div class="spinner"></div>लोड हुँदैछ…</div>
    </div>

    <div class="panel" style="margin-top:32px;">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/></svg>
        राजनीतिक दलहरूको संसदीय कार्यालय
      </h2>
      <table class="contact-table" id="partyOfficeTable">
        <thead><tr><th>दल</th><th>संसदीय दलको कार्यालय</th><th>कर्मचारी कार्यकक्ष</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<footer class="site-footer" id="siteFooter"></footer>
<button class="scroll-top" id="scrollTopBtn" aria-label="माथि जानुहोस्"></button>

<script src="assets/js/app.js"></script>
<script>
APP.renderHeader("leadership.html");
APP.renderFooter();
APP.initScrollTop();

(async function () {
  const grid = document.getElementById("leaderGrid");
  const tbody = document.querySelector("#partyOfficeTable tbody");
  let data;
  try {
    data = await APP.loadJSON("leadership.json");
  } catch (e) {
    grid.innerHTML = `<div class="no-results"><p>लोड गर्न असफल भयो।</p></div>`;
    return;
  }

  grid.innerHTML = data.leadership.map(l => {
    const initial = (l.name_ne || "?").replace(/^मा\.\s*/, "").replace(/^श्री\s*/, "").trim().charAt(0);
    return `
      <div class="leader-card">
        <div class="avatar-lg">${initial}</div>
        <div class="leader-role">${APP.escapeHtml(l.role_ne)} · ${l.house === "HoR" ? "प्रतिनिधि सभा" : l.house === "NA" ? "राष्ट्रिय सभा" : "सरकार"}</div>
        <h3>${APP.escapeHtml(l.name_ne)}</h3>
        <div class="en">${APP.escapeHtml(l.name_en || "")}</div>
        <div class="leader-contact">
          ${l.office_phone ? `<div><a href="tel:${l.office_phone.replace(/\D/g,"")}">${l.office_phone}</a></div>` : ""}
          ${l.email ? `<div><a href="mailto:${l.email}">${l.email}</a></div>` : ""}
          ${!l.verified ? `<div style="color:var(--ink-faint);font-size:0.7rem;">⚠ स्रोत पुष्टि हुन बाँकी</div>` : ""}
        </div>
      </div>
    `;
  }).join("");

  tbody.innerHTML = data.party_offices.map(p => `
    <tr>
      <td><strong>${p.party_code}</strong> — ${APP.escapeHtml(p.party_ne)}</td>
      <td>${p.parliamentary_office || "—"}</td>
      <td>${p.staff_office || "—"}</td>
    </tr>
  `).join("");
})();
</script>
</body>
</html>
