<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>तथ्याङ्क | Statistics — संघीय संसद सम्पर्क निर्देशिका</title>
<meta name="description" content="दलगत, सदनगत र जिल्लागत संसद सदस्य विभाजनको इन्टरएक्टिभ तथ्याङ्क र चार्टहरू।">
<meta name="theme-color" content="#0B1A2E">
<link rel="canonical" href="https://nepal-parliament-directory.vercel.app/statistics.html">
<link rel="icon" href="assets/images/emblem.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<a class="skip-link" href="#main">मुख्य सामग्रीमा जानुहोस्</a>
<header class="site-header" id="siteHeader"></header>

<main id="main">
  <div class="page-hero">
    <h1>तथ्याङ्क</h1>
    <p>संघीय संसदको दलगत, सदनगत र जिल्लागत सदस्य विभाजन।</p>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="section">
    <div class="chart-grid" style="margin-top:12px;">
      <div class="panel">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
          दल अनुसार विभाजन
        </h2>
        <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;">
          <div id="partyDonut"></div>
          <div id="partyLegend" style="flex:1;min-width:200px;"></div>
        </div>
      </div>

      <div class="panel">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/></svg>
          सदन अनुसार विभाजन
        </h2>
        <div id="houseColumns"></div>
      </div>
    </div>

    <div class="panel" style="margin-top:20px;">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        शीर्ष जिल्ला/प्रदेश (सदस्य संख्या अनुसार)
      </h2>
      <div id="districtBars"></div>
    </div>

    <div class="panel" style="margin-top:20px;">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        डाटा पूर्णता
      </h2>
      <div id="completenessBars"></div>
    </div>
  </div>
</main>

<footer class="site-footer" id="siteFooter"></footer>
<button class="scroll-top" id="scrollTopBtn" aria-label="माथि जानुहोस्"></button>

<script src="assets/js/app.js"></script>
<script src="assets/js/charts.js"></script>
<script>
APP.renderHeader("statistics.html");
APP.renderFooter();
APP.initScrollTop();

(async function () {
  let stats;
  try {
    stats = await APP.loadJSON("statistics.json");
  } catch (e) {
    document.getElementById("main").innerHTML = `<div class="panel"><p>तथ्याङ्क लोड गर्न असफल भयो।</p></div>`;
    return;
  }

  document.getElementById("statsBar").innerHTML = `
    <div class="stat-item"><div class="num">${stats.total_members}</div><div class="label">कुल सदस्य</div></div>
    <div class="stat-item"><div class="num">${stats.by_house.HoR}</div><div class="label">प्रतिनिधि सभा</div></div>
    <div class="stat-item"><div class="num">${stats.by_house.NA}</div><div class="label">राष्ट्रिय सभा</div></div>
    <div class="stat-item"><div class="num">${Object.keys(stats.by_party).length}</div><div class="label">राजनीतिक दलहरू</div></div>
  `;

  const partyColors = {
    RSP: "var(--party-rsp)", NC: "var(--party-nc)", UML: "var(--party-uml)", MLM: "var(--party-mlm)",
    RPP: "var(--party-rpp)", SP: "var(--party-sp)", JSP: "var(--party-jsp)", LSP: "var(--party-lsp)",
    IND: "var(--party-ind)", NOM: "var(--party-nom)", OTH: "var(--party-oth)"
  };
  const rootStyles = getComputedStyle(document.documentElement);
  function resolveVar(v) {
    const m = v.match(/var\((--[\w-]+)\)/);
    return m ? rootStyles.getPropertyValue(m[1]).trim() : v;
  }

  const partyEntries = Object.entries(stats.by_party).sort((a,b) => b[1]-a[1]);
  const segments = partyEntries.map(([code, val]) => ({
    label: `${stats.party_labels[code] || code} (${code})`,
    value: val,
    color: resolveVar(partyColors[code] || "var(--party-oth)")
  }));
  CHARTS.donut(document.getElementById("partyDonut"), segments, { size: 200 });

  document.getElementById("partyLegend").innerHTML = partyEntries.map(([code, val]) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:0.85rem;">
      <span style="width:12px;height:12px;border-radius:3px;background:${partyColors[code]||'var(--party-oth)'};flex-shrink:0;"></span>
      <span style="flex:1;">${stats.party_labels[code] || code} <span style="color:var(--ink-faint);">(${code})</span></span>
      <strong>${val}</strong>
    </div>
  `).join("");

  CHARTS.columnChart(document.getElementById("houseColumns"), [
    { label: "प्रतिनिधि सभा", value: stats.by_house.HoR, color: resolveVar("var(--party-rsp)") },
    { label: "राष्ट्रिय सभा", value: stats.by_house.NA, color: resolveVar("var(--gold)") },
  ], { width: 320, height: 200 });

  const districtRows = Object.entries(stats.top_districts).map(([d, v]) => ({
    label: d, value: v, color: resolveVar("var(--gold)")
  }));
  CHARTS.barList(document.getElementById("districtBars"), districtRows);

  const c = stats.data_completeness;
  CHARTS.barList(document.getElementById("completenessBars"), [
    { label: "फोन उपलब्ध", value: c.with_phone, color: resolveVar("var(--party-nc)") },
    { label: "फोन अनुपलब्ध", value: c.without_phone, color: resolveVar("var(--crimson)") },
    { label: "इमेल उपलब्ध", value: c.with_email, color: resolveVar("var(--party-rsp)") },
    { label: "फोटो उपलब्ध", value: c.with_photo, color: resolveVar("var(--gold)") },
  ]);
})();
</script>
</body>
</html>
